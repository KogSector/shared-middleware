syntax = "proto3";

package confuse.events;

option java_package = "com.confuse.events";
option java_multiple_files = true;

// Common event headers included in all events
message EventHeaders {
  // Unique event identifier (UUID)
  string event_id = 1;
  // Event type name (e.g., "CODE_INGESTED")
  string event_type = 2;
  // ISO 8601 timestamp
  string timestamp = 3;
  // Service that produced this event
  string source_service = 4;
  // Optional correlation ID for request tracing
  optional string correlation_id = 5;
  // Optional OpenTelemetry trace ID
  optional string trace_id = 6;
}

// Event metadata for processing context
message EventMetadata {
  // Number of times this event has been retried
  uint32 retry_count = 1;
  // Original event ID if this is a retry
  optional string original_event_id = 2;
  // User ID who triggered the action (if applicable)
  optional string user_id = 3;
  // Tenant ID for multi-tenancy
  optional string tenant_id = 4;
}

// File type classification
enum FileType {
  FILE_TYPE_UNKNOWN = 0;
  FILE_TYPE_CODE = 1;
  FILE_TYPE_DOCUMENT = 2;
}

// Source types for ingestion
enum SourceType {
  SOURCE_TYPE_UNKNOWN = 0;
  SOURCE_TYPE_GITHUB = 1;
  SOURCE_TYPE_GITLAB = 2;
  SOURCE_TYPE_BITBUCKET = 3;
  SOURCE_TYPE_LOCAL = 4;
  SOURCE_TYPE_GOOGLE_DRIVE = 5;
  SOURCE_TYPE_NOTION = 6;
  SOURCE_TYPE_FILE_UPLOAD = 7;
  SOURCE_TYPE_DROPBOX = 8;
  SOURCE_TYPE_ONEDRIVE = 9;
}
