syntax = "proto3";

package confuse.events.code;

import "common.proto";

option java_package = "com.confuse.events.code";
option java_multiple_files = true;

// =============================================================================
// Code Ingestion Events
// Published to topic: code.ingested
// =============================================================================

// Event published when a code file is ingested and ready for processing
message CodeIngestedEvent {
  // Common event headers
  confuse.events.EventHeaders headers = 1;
  // Event metadata
  confuse.events.EventMetadata metadata = 2;
  
  // Unique file identifier
  string file_id = 3;
  // Source this file belongs to
  string source_id = 4;
  // Relative path within the source
  string file_path = 5;
  // File name with extension
  string file_name = 6;
  // File extension without dot (e.g., "py", "rs")
  string file_extension = 7;
  // File size in bytes
  uint64 file_size_bytes = 8;
  // SHA-256 hash of file content
  string content_hash = 9;
  // MinIO/S3 storage path
  string storage_location = 10;
  // Programming language detected
  string language = 11;
  // Is configuration file
  bool is_config = 12;
}

// =============================================================================
// Code Processing Events
// Published to topic: code.processed
// =============================================================================

// Processed code chunk with AST information
message CodeChunk {
  // Unique chunk identifier
  string chunk_id = 1;
  // Chunk content
  string content = 2;
  // Start line number (1-indexed)
  uint32 start_line = 3;
  // End line number (1-indexed)
  uint32 end_line = 4;
  // Type of chunk (function, class, method, module, etc.)
  string chunk_type = 5;
  // Name of the code element (function name, class name, etc.)
  optional string name = 6;
  // Parent element name (class name for methods)
  optional string parent_name = 7;
  // Signature for functions/methods
  optional string signature = 8;
}

// Event published when a code file has been processed
message CodeProcessedEvent {
  // Common event headers
  confuse.events.EventHeaders headers = 1;
  // Event metadata
  confuse.events.EventMetadata metadata = 2;
  
  // Original file identifier
  string file_id = 3;
  // Source identifier
  string source_id = 4;
  // Programming language
  string language = 5;
  // Processed code chunks with AST info
  repeated CodeChunk chunks = 6;
  // Number of functions found
  uint32 functions_count = 7;
  // Number of classes found
  uint32 classes_count = 8;
  // List of imports
  repeated string imports = 9;
  // Processing time in milliseconds
  uint64 processing_time_ms = 10;
}
