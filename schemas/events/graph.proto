syntax = "proto3";

package confuse.events.graph;

import "common.proto";

option java_package = "com.confuse.events.graph";
option java_multiple_files = true;

// =============================================================================
// Graph Events
// Published to topic: graph.updated
// =============================================================================

// Relationship created in knowledge graph
message GraphRelationship {
  // Source node ID
  string source_node_id = 1;
  // Target node ID
  string target_node_id = 2;
  // Relationship type
  string relationship_type = 3;
  // Relationship properties (JSON string)
  optional string properties = 4;
}

// Event published when the knowledge graph has been updated
message GraphUpdatedEvent {
  // Common event headers
  confuse.events.EventHeaders headers = 1;
  // Event metadata
  confuse.events.EventMetadata metadata = 2;
  
  // Source identifier
  string source_id = 3;
  // File identifier (if update is for a specific file)
  optional string file_id = 4;
  // Number of nodes added
  uint32 nodes_added = 5;
  // Number of nodes updated
  uint32 nodes_updated = 6;
  // Number of edges added
  uint32 edges_added = 7;
  // Number of edges updated
  uint32 edges_updated = 8;
  // Sample relationships (for debugging/monitoring)
  repeated GraphRelationship sample_relationships = 9;
  // Processing time in milliseconds
  uint64 processing_time_ms = 10;
}

// =============================================================================
// Graph Build Events
// Published to topic: graph.build.requested / graph.build.completed
// =============================================================================

// Event to request a graph build/rebuild
message GraphBuildRequestedEvent {
  // Common event headers
  confuse.events.EventHeaders headers = 1;
  // Event metadata
  confuse.events.EventMetadata metadata = 2;
  
  // Source identifier
  string source_id = 3;
  // Force full rebuild (instead of incremental)
  bool force_rebuild = 4;
  // Build type (incremental, full, partial)
  string build_type = 5;
}

// Event published when graph build completes
message GraphBuildCompletedEvent {
  // Common event headers
  confuse.events.EventHeaders headers = 1;
  // Event metadata
  confuse.events.EventMetadata metadata = 2;
  
  // Source identifier
  string source_id = 3;
  // Total relationships created
  uint32 relationships_created = 4;
  // Total entities created
  uint32 entities_created = 5;
  // Build time in milliseconds
  uint64 build_time_ms = 6;
  // Build type that was performed
  string build_type = 7;
}
