syntax = "proto3";

package confuse.events.embedding;

import "common.proto";

option java_package = "com.confuse.events.embedding";
option java_multiple_files = true;

// =============================================================================
// Embedding Events
// Published to topic: embedding.generated
// =============================================================================

// Event published when embeddings have been generated for chunks
message EmbeddingGeneratedEvent {
  // Common event headers
  confuse.events.EventHeaders headers = 1;
  // Event metadata
  confuse.events.EventMetadata metadata = 2;
  
  // Original file identifier
  string file_id = 3;
  // Source identifier
  string source_id = 4;
  // IDs of chunks that were embedded
  repeated string chunk_ids = 5;
  // Model used for embeddings
  string embedding_model = 6;
  // Dimension of embedding vectors
  uint32 embedding_dimension = 7;
  // Total number of chunks processed
  uint32 total_chunks = 8;
  // Storage location for embeddings (vector DB reference)
  string vector_storage_location = 9;
  // Processing time in milliseconds
  uint64 processing_time_ms = 10;
}
