syntax = "proto3";

package confuse.events.dlq;

import "common.proto";

option java_package = "com.confuse.events.dlq";
option java_multiple_files = true;

// =============================================================================
// Dead Letter Queue Events
// Published to topic: dlq.processing.failed
// =============================================================================

// Event published when processing fails and message goes to DLQ
message ProcessingFailedEvent {
  // Common event headers
  confuse.events.EventHeaders headers = 1;
  // Event metadata
  confuse.events.EventMetadata metadata = 2;
  
  // Original topic the event was on
  string original_topic = 3;
  // ID of the failed event
  string original_event_id = 4;
  // Error message
  string error_message = 5;
  // Type of error (e.g., PARSE_ERROR, PROCESSING_ERROR, TIMEOUT)
  string error_type = 6;
  // Error code (application-specific)
  string error_code = 7;
  // Number of retries attempted
  uint32 retry_count = 8;
  // Whether this error is retryable
  bool is_retryable = 9;
  // Original event payload as JSON string
  string original_payload = 10;
  // Timestamp when error occurred
  string error_timestamp = 11;
  // Service that failed to process
  string failed_service = 12;
}

// =============================================================================
// Source Sync Events
// Published to topic: source.sync.requested / source.sync.completed / source.sync.failed
// =============================================================================

// Event triggered when source sync is requested
message SourceSyncRequestedEvent {
  // Common event headers
  confuse.events.EventHeaders headers = 1;
  // Event metadata
  confuse.events.EventMetadata metadata = 2;
  
  // Unique source identifier
  string source_id = 3;
  // Type of source
  confuse.events.SourceType source_type = 4;
  // URL or path to the source
  string source_url = 5;
  // Branch for git sources
  optional string branch = 6;
  // Access token (encrypted)
  optional string access_token = 7;
  // Whether to force full resync
  bool full_sync = 8;
  // User who requested the sync
  optional string requested_by = 9;
}

// Event triggered when source sync completes
message SourceSyncCompletedEvent {
  // Common event headers
  confuse.events.EventHeaders headers = 1;
  // Event metadata
  confuse.events.EventMetadata metadata = 2;
  
  // Source identifier
  string source_id = 3;
  // Number of files processed
  uint32 files_processed = 4;
  // Number of code files
  uint32 code_files_count = 5;
  // Number of document files
  uint32 doc_files_count = 6;
  // Duration in milliseconds
  uint64 duration_ms = 7;
  // Job ID for tracking
  optional string job_id = 8;
}

// Event triggered when source sync fails
message SourceSyncFailedEvent {
  // Common event headers
  confuse.events.EventHeaders headers = 1;
  // Event metadata
  confuse.events.EventMetadata metadata = 2;
  
  // Source identifier
  string source_id = 3;
  // Error message
  string error = 4;
  // Error code
  string error_code = 5;
  // Job ID for tracking
  optional string job_id = 6;
}
