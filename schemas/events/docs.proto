syntax = "proto3";

package confuse.events.docs;

import "common.proto";

option java_package = "com.confuse.events.docs";
option java_multiple_files = true;

// =============================================================================
// Document Ingestion Events
// Published to topic: docs.ingested
// =============================================================================

// Event published when a document file is ingested and ready for processing
message DocsIngestedEvent {
  // Common event headers
  confuse.events.EventHeaders headers = 1;
  // Event metadata
  confuse.events.EventMetadata metadata = 2;
  
  // Unique file identifier
  string file_id = 3;
  // Source this file belongs to
  string source_id = 4;
  // Relative path within the source
  string file_path = 5;
  // File name with extension
  string file_name = 6;
  // File extension without dot
  string file_extension = 7;
  // File size in bytes
  uint64 file_size_bytes = 8;
  // SHA-256 hash of file content
  string content_hash = 9;
  // MinIO/S3 storage path
  string storage_location = 10;
  // Document type category (pdf, docx, markdown, html, etc.)
  string document_type = 11;
}

// =============================================================================
// Document Processing Events
// Published to topic: docs.processed
// =============================================================================

// Processed document chunk
message DocChunk {
  // Unique chunk identifier
  string chunk_id = 1;
  // Chunk content (text)
  string content = 2;
  // Page number (for paginated documents)
  optional uint32 page_number = 3;
  // Type of chunk (paragraph, heading, table, list, etc.)
  string chunk_type = 4;
  // Section heading this chunk belongs to
  optional string section_heading = 5;
}

// Table extracted from document
message ExtractedTable {
  // Table identifier
  string table_id = 1;
  // Page number where table appears
  optional uint32 page_number = 2;
  // Number of rows
  uint32 row_count = 3;
  // Number of columns
  uint32 column_count = 4;
  // Table content as markdown
  string content_markdown = 5;
}

// Event published when a document has been processed
message DocsProcessedEvent {
  // Common event headers
  confuse.events.EventHeaders headers = 1;
  // Event metadata
  confuse.events.EventMetadata metadata = 2;
  
  // Original file identifier
  string file_id = 3;
  // Source identifier
  string source_id = 4;
  // Document type (pdf, docx, etc.)
  string document_type = 5;
  // Processed document chunks
  repeated DocChunk chunks = 6;
  // Number of pages
  uint32 page_count = 7;
  // Total word count
  uint32 word_count = 8;
  // Contains tables
  bool has_tables = 9;
  // Extracted tables
  repeated ExtractedTable tables = 10;
  // Contains images
  bool has_images = 11;
  // Processing time in milliseconds
  uint64 processing_time_ms = 12;
}
